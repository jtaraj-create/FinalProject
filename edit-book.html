<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Book</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<header class="topbar"><div class="container nav-content"><div><div class="logo">Edit Book</div><div class="subtitle">Update an existing database record</div></div><a class="btn btn-light" href="index.html">Back</a></div></header>
<main class="container">
    <section class="panel form-card">
        <h1>Edit Book</h1>
        <div id="formMessage" class="message"></div>
        <form id="editBookForm">
            <div class="form-group"><label for="bookId">Book ID</label><input type="text" id="bookId" readonly></div>
            <div class="form-group"><label for="bookTitle">Book Title</label><input type="text" id="bookTitle" required></div>
            <div class="form-group"><label for="bookAuthor">Author</label><input type="text" id="bookAuthor" required></div>
            <div class="form-group"><label for="bookCategory">Category</label><input type="text" id="bookCategory" required></div>
            <div class="form-group"><label for="bookStatus">Status</label><select id="bookStatus"><option value="Available">Available</option><option value="Borrowed">Borrowed</option></select></div>
            <div class="actions"><a href="index.html" class="btn btn-secondary">Cancel</a><button class="btn btn-primary" type="submit">Update Book</button></div>
        </form>
    </section>
</main>
<script src="assets/js/api.js"></script>
<script src="assets/js/edit-book.js"></script>
</body>
</html>
